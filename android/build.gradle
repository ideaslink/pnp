allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = file("../build")
subprojects {
    def rootDrive = rootProject.projectDir.absolutePath.substring(0, 3).toLowerCase()
    def projectDrive = project.projectDir.absolutePath.substring(0, 3).toLowerCase()
    if (rootDrive == projectDrive) {
        project.buildDir = "${rootProject.buildDir}/${project.name}"
    } else {
        project.buildDir = new File(System.getProperty("java.io.tmpdir"), "flutter_pnp_build/${project.name}")
    }
}
subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
